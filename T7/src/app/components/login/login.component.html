<div class="login-card">
  <h2>{{ t.loginTitle }}</h2>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="onLogin()">
    <div class="form-group">
      <label>{{ t.loginLabel }}</label>
      <input type="text" name="login" [(ngModel)]="loginData.login" required>
    </div>

    <div class="form-group">
      <label>{{ t.passwordLabel }}</label>
      <input type="password" name="password" [(ngModel)]="loginData.password" required>
    </div>

    <button type="submit" class="submit-btn">{{ t.loginBtn }}</button>
  </form>
</div>
