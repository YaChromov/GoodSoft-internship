<div class="edit-card">
  <h2>{{ t.passwordEditTitle }}</h2>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>{{ t.oldPasswordLabel }}</label>
      <p-password
        name="oldPassword"
        [(ngModel)]="passwordData.oldPassword"
        [feedback]="false"
        [toggleMask]="true">
      </p-password>
    </div>

    <div class="form-group">
      <label>{{ t.newPasswordLabel }}</label>
      <p-password
        name="newPassword"
        [(ngModel)]="passwordData.newPassword"
        [feedback]="true"
        [toggleMask]="true"
        promptLabel=" "
        weakLabel=" "
        mediumLabel=" "
        strongLabel=" ">
      </p-password>
    </div>

    <div class="btn-group">
      <button type="submit" class="submit-btn">{{ t.submitBtn }}</button>
      <a routerLink="/welcome" class="back-link">{{ t.cancelBtn }}</a>
    </div>
  </form>
</div>
