<div class="form-card">
  <h2>РЕГИСТРАЦИЯ ПОЛЬЗОВАТЕЛЯ</h2>

  <form (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label>ЛОГИН</label>
        <input pInputText name="login" [(ngModel)]="user.login" required placeholder="user123" />
      </div>
      <div class="form-group">
        <label>ПАРОЛЬ</label>
        <p-password
          name="password"
          [(ngModel)]="user.password"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="••••••••">
        </p-password>
      </div>
    </div>

    <div class="form-group">
      <label>РОЛИ</label>
      <div class="roles-selection">
        <div *ngFor="let role of allRoles" class="role-checkbox">
          <p-checkbox
            name="roles"
            [value]="role"
            [(ngModel)]="user.roles"
            [inputId]="role">
          </p-checkbox>
          <label [for]="role" class="role-label">{{ role }}</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>ФАМИЛИЯ</label>
      <input pInputText name="surname" [(ngModel)]="user.surname" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>ИМЯ</label>
        <input pInputText name="name" [(ngModel)]="user.name" />
      </div>
      <div class="form-group">
        <label>ОТЧЕСТВО</label>
        <input pInputText name="patronymic" [(ngModel)]="user.patronymic" />
      </div>
    </div>

    <div class="form-group">
      <label>EMAIL</label>
      <input pInputText name="email" type="email" [(ngModel)]="user.email" placeholder="example@mail.com" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>ДАТА РОЖДЕНИЯ</label>
        <p-datepicker
          name="birthday"
          [(ngModel)]="user.birthday"
          dateFormat="yy-mm-dd"
          [showIcon]="true"
          [inline]="false">
        </p-datepicker>
      </div>
    </div>

    <button type="submit" class="btn-submit">ЗАРЕГИСТРИРОВАТЬ</button>
    <a routerLink="/userlist" class="back-link">ОТМЕНА</a>
  </form>
</div>
