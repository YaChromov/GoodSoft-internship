<div class="form-card">
  <h2>{{ title }}</h2>

  <div *ngIf="errorMessage" class="error-banner">
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label>{{ t.loginLabel }}</label>
        <input pInputText name="login" [(ngModel)]="user.login" [required]="!isEditMode" [readonly]="isEditMode" [class.readonly-input]="isEditMode" />
      </div>

      <div class="form-group" *ngIf="!isEditMode">
        <label>{{ t.passwordLabel }}</label>
        <p-password name="password" [(ngModel)]="user.password" [feedback]="false" [toggleMask]="true"></p-password>
      </div>
    </div>

    <div class="form-group">
      <label>{{ t.rolesLabel }}</label>
      <div class="roles-container">
        <div *ngFor="let role of allRoles" class="role-option">
          <p-checkbox name="roles" [value]="role" [(ngModel)]="user.roles" [inputId]="role" [disabled]="isEditMode && isSelfAdminLock(role)"></p-checkbox>
          <label [for]="role" class="role-label">{{ role }}</label>
        </div>
      </div>
    </div>

    <div class="form-group"><label>{{ t.surnameLabel }}</label><input pInputText name="surname" [(ngModel)]="user.surname" /></div>
    <div class="form-row">
      <div class="form-group"><label>{{ t.nameLabel }}</label><input pInputText name="name" [(ngModel)]="user.name" /></div>
      <div class="form-group"><label>{{ t.patronymicLabel }}</label><input pInputText name="patronymic" [(ngModel)]="user.patronymic" /></div>
    </div>
    <div class="form-group"><label>{{ t.emailLabel }}</label><input pInputText name="email" type="email" [(ngModel)]="user.email" /></div>
    <div class="form-row">
      <div class="form-group">
        <label>{{ t.birthdayLabel }}</label>
        <p-datepicker name="birthday" [(ngModel)]="user.birthday" dateFormat="yy-mm-dd" [showIcon]="true"></p-datepicker>
      </div>
    </div>

    <button type="submit" class="btn-submit">
      {{ isEditMode ? t.saveBtn : t.registerBtn }}
    </button>
    <a routerLink="/userlist" class="back-link">{{ t.cancelBtn }}</a>
  </form>
</div>
