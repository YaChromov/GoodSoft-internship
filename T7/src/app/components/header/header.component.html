<header>
  <div class="logo">XPOM</div>

  <div class="header-right">
    <div class="lang-switcher">
      <a href="javascript:void(0)"
         (click)="setLanguage('ru')"
         class="lang-link"
         [class.active]="currentLang === 'ru'">RU</a>
      <a href="javascript:void(0)"
         (click)="setLanguage('en')"
         class="lang-link"
         [class.active]="currentLang === 'en'">EN</a>
    </div>

    <div class="auth-info"
         *ngIf="authService.currentUser$ | async">

      {{ t.authenticatedAs }}

      <a routerLink="/loginedit" class="user-link">
        <strong>{{ authService.username }}</strong>
      </a>

      <button class="logout-btn" (click)="onLogout()">
        {{ t.logout }}
      </button>
    </div>
  </div>
</header>

<nav *ngIf="authService.currentUser$ | async">
  <div class="nav-links">
    <a routerLink="/welcome">{{ t.home }}</a>

    <a *ngIf="authService.isAdmin" routerLink="/userlist">
      {{ t.users }}
    </a>
  </div>

  <a *ngIf="authService.isAdmin && (isUserList$ | async)"
     routerLink="/useradd"
     class="btn-add">
    {{ t.addUser }}
  </a>
</nav>
