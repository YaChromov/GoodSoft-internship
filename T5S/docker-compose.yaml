services:
  # PostgreSQL
  db:
    image: postgres:17-alpine
    container_name: t5s-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d t5s_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  #  pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: t5s-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  # Spring Boot
  app:
    build: .
    container_name: t5s-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: